name: Build TDLib with captcha support

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Clone and patch TDLib
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git
          cd td

          # Patch 1: Enable captcha/verification handler on ALL platforms
          # TD_TEST_VERIFICATION stays 0 (no fake errors)
          # But we replace the platform guard so verifier_ is created on Windows too
          $file = Get-Content "td/telegram/net/NetQueryDispatcher.cpp" -Raw

          # Replace all occurrences of the platform guard with #if 1
          $guard = 'TD_ANDROID || TD_DARWIN_IOS || TD_DARWIN_VISION_OS || TD_DARWIN_WATCH_OS || TD_TEST_VERIFICATION'
          $file = $file.Replace($guard, '1')

          Set-Content "td/telegram/net/NetQueryDispatcher.cpp" $file
          Write-Host "Patch 1: platform guard replaced with #if 1"

          # Patch 2: Remove app_version TDLib suffix
          (Get-Content "td/telegram/Td.cpp") -replace 'api_id != 21724', 'api_id == -1' | Set-Content "td/telegram/Td.cpp"
          Write-Host "Patch 2: no TDLib version suffix"

      - name: Setup vcpkg
        run: |
          cd td
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows

      - name: Build tdjson.dll
        run: |
          cd td
          mkdir build
          cd build
          cmake -A x64 -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_MULTI_PROCESSOR_COMPILATION=ON -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../vcpkg/scripts/buildsystems/vcpkg.cmake ..
          cmake --build . --target install --config Release

      - name: Collect all DLLs
        run: |
          mkdir artifact
          copy td\tdlib\bin\tdjson.dll artifact\
          copy td\vcpkg\installed\x64-windows\bin\*.dll artifact\
          dir artifact\

      - name: Upload all DLLs
        uses: actions/upload-artifact@v4
        with:
          name: tdjson-windows-x64-patched
          path: artifact/
